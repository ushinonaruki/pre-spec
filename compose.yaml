services:
  node:
    build:
      context: ./docker/node
      dockerfile: Dockerfile
    ports:
      - "${NODE_PORT_HOST}:${NODE_PORT_CONTAINER}"
    env_file:
      - path: .env
        required: false
    volumes:
      # Source directories (hot reload)
      - ./app:/app/app
      - ./components:/app/components
      - ./lib:/app/lib
      - ./types:/app/types
      - ./public:/app/public
      # Config files
      - ./package.json:/app/package.json
      - ./package-lock.json:/app/package-lock.json
      - ./tsconfig.json:/app/tsconfig.json
      - ./next.config.ts:/app/next.config.ts
      - ./eslint.config.mjs:/app/eslint.config.mjs
      - ./postcss.config.mjs:/app/postcss.config.mjs
      # node_modules and .next stay inside the container only
      - node_modules:/app/node_modules
      - next_build:/app/.next

volumes:
  node_modules:
  next_build:
